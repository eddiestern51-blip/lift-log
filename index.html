<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lift Log">
<meta name="theme-color" content="#121316">
<title>Lift Log</title>
<style>
  :root {
    --bg: #121316;
    --card: #1c1e23;
    --card2: #24272e;
    --border: #33363d;
    --text: #eef0f3;
    --muted: #9096a2;
    --accent: #5aa9ff;
    --accent2: #ffb454;
    --danger: #ff6b6b;
    --good: #4cd97b;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overscroll-behavior-y: none; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding-bottom: calc(84px + env(safe-area-inset-bottom));
  }
  body.sheet-open { overflow: hidden; }
  header {
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: calc(10px + env(safe-area-inset-top)) 12px 10px;
  }
  .date-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .date-row input[type=date] {
    flex: 1;
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 10px;
    font-size: 16px;
  }
  .icon-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    width: 44px;
    height: 44px;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .icon-btn:active { background: var(--card2); }
  h1 {
    font-size: 18px;
    margin: 8px 0 10px 2px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .tabs {
    position: sticky;
    top: 66px;
    z-index: 19;
    display: flex;
    gap: 6px;
    background: var(--bg);
    padding: 4px 0 8px;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 12px 2px;
    border-radius: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.4px;
  }
  .tab.active {
    background: var(--accent);
    color: #0b1220;
    border-color: var(--accent);
  }
  main { padding: 0 12px; max-width: 640px; margin: 0 auto; }
  .section { display: none; }
  .section.active { display: block; }

  .exercise-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .exercise-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 14px;
  }
  .exercise-headcol {
    display: flex;
    flex-direction: column;
    gap: 3px;
    min-width: 0;
    flex: 1;
    margin-right: 10px;
  }
  .exercise-name {
    font-weight: 700;
    font-size: 15px;
  }
  .exercise-last {
    font-size: 11.5px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .add-set-btn {
    background: var(--accent);
    color: #0b1220;
    border: none;
    border-radius: 8px;
    padding: 10px 14px;
    font-weight: 700;
    font-size: 13px;
    min-height: 40px;
    flex-shrink: 0;
  }
  .add-set-btn:active { opacity: 0.8; }

  .set-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 6px 4px 14px;
    border-top: 1px solid var(--border);
  }
  .set-row .set-tap {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 0;
  }
  .set-num {
    width: 22px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .set-summary {
    font-size: 15px;
    font-weight: 600;
  }
  .del-set {
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: transparent;
    border: none;
    color: var(--danger);
    font-size: 17px;
    line-height: 1;
  }
  .empty-hint {
    padding: 10px 14px 14px;
    color: var(--muted);
    font-size: 13px;
  }

  .share-btn {
    width: 100%;
    background: var(--accent);
    color: #0b1220;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    margin: 4px 0 14px;
    min-height: 48px;
  }
  .share-btn:active { opacity: 0.85; }

  .summary-block {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .summary-cat-title {
    padding: 10px 14px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--accent);
    background: var(--card2);
  }
  .summary-ex-row {
    padding: 9px 14px;
    border-top: 1px solid var(--border);
  }
  .summary-ex-name {
    font-size: 13.5px;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .summary-ex-sets {
    font-size: 13.5px;
    color: var(--text);
  }

  .shots-wrap {
    margin: 10px 0 16px;
  }
  .shots-title {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .shots-grid {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .shot-thumb {
    position: relative;
    width: 68px;
    height: 68px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .shot-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .shot-thumb .x {
    position: absolute;
    top: 0;
    right: 0;
    background: rgba(0,0,0,0.65);
    color: #fff;
    border: none;
    border-radius: 0 0 0 10px;
    width: 26px;
    height: 26px;
    font-size: 13px;
    line-height: 1;
  }
  .add-shot {
    width: 68px;
    height: 68px;
    border-radius: 10px;
    border: 1px dashed var(--border);
    background: var(--card);
    color: var(--muted);
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .add-shot input { display: none; }

  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal.open { display: flex; }
  .modal img { max-width: 100%; max-height: 100%; border-radius: 8px; }

  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--card);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
    gap: 8px;
    z-index: 20;
  }
  .bottom-nav button {
    flex: 1;
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    min-height: 44px;
  }

  .history-panel {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 50;
    padding: calc(12px + env(safe-area-inset-top)) 12px 12px;
    overflow-y: auto;
  }
  .history-panel.open { display: block; }
  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .history-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .history-item .d {
    font-weight: 700;
    font-size: 15px;
  }
  .history-item .meta {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .go-btn {
    background: var(--accent);
    color: #0b1220;
    border: none;
    border-radius: 8px;
    padding: 10px 14px;
    font-weight: 700;
    font-size: 13px;
    min-height: 40px;
  }
  .close-btn {
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 10px 16px;
    font-weight: 600;
    min-height: 40px;
  }
  .toast {
    position: fixed;
    bottom: calc(76px + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    background: var(--good);
    color: #0b1220;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
    z-index: 200;
  }
  .toast.show { opacity: 1; }

  /* ---- Wheel-picker sheet ---- */
  .sheet-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 199;
  }
  .sheet-backdrop.open { display: block; }
  .sheet {
    display: none;
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 200;
    background: var(--card);
    border-top: 1px solid var(--border);
    border-radius: 18px 18px 0 0;
    padding: 10px 14px calc(20px + env(safe-area-inset-bottom));
    box-shadow: 0 -8px 30px rgba(0,0,0,0.5);
  }
  .sheet.open { display: block; }
  .sheet-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0 4px;
  }
  .sheet-titles { text-align: center; flex: 1; }
  .sheet-title {
    font-size: 15px;
    font-weight: 700;
  }
  .sheet-subtitle {
    font-size: 12px;
    color: var(--muted);
    margin-top: 1px;
  }
  .sheet-last {
    font-size: 12px;
    color: var(--accent2);
    margin-top: 3px;
  }
  .sheet-close {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--card2);
    border: none;
    color: var(--muted);
    font-size: 15px;
  }
  .sheet-close.spacer { visibility: hidden; }

  .wheels-row {
    position: relative;
    display: flex;
    gap: 4px;
    margin: 8px 0 4px;
  }
  .wheel-highlight {
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    height: 40px;
    background: rgba(255,255,255,0.05);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    pointer-events: none;
    border-radius: 8px;
  }
  .wheel-col {
    flex: 1;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .wheel-label {
    font-size: 10.5px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .wheel-scroll {
    position: relative;
    width: 100%;
    height: 150px;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .wheel-scroll::-webkit-scrollbar { display: none; }
  .wheel-item {
    height: 40px;
    line-height: 40px;
    text-align: center;
    font-size: 19px;
    color: var(--muted);
    scroll-snap-align: center;
  }
  .wheel-item.active {
    color: var(--text);
    font-weight: 700;
    font-size: 23px;
  }
  .wheel-fade {
    position: absolute;
    left: 0;
    right: 0;
    height: 55px;
    pointer-events: none;
    z-index: 2;
  }
  .wheel-fade.top {
    top: 0;
    background: linear-gradient(var(--card), rgba(28,30,35,0));
  }
  .wheel-fade.bottom {
    bottom: 0;
    background: linear-gradient(rgba(28,30,35,0), var(--card));
  }

  .sheet-save-btn {
    width: 100%;
    background: var(--accent);
    color: #0b1220;
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-size: 16px;
    font-weight: 700;
    margin-top: 10px;
    min-height: 50px;
  }
  .sheet-save-btn:active { opacity: 0.85; }
  .sheet-delete-btn {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--danger);
    font-size: 14px;
    font-weight: 600;
    padding: 12px;
    margin-top: 2px;
  }
</style>
</head>
<body>

<header>
  <div class="date-row">
    <button class="icon-btn" id="prevDay">&#8592;</button>
    <input type="date" id="dateInput">
    <button class="icon-btn" id="nextDay">&#8594;</button>
    <button class="icon-btn" id="reloadBtn" title="Reload latest version">&#8635;</button>
  </div>
</header>

<main>
  <h1 id="dayTitle">Workout</h1>

  <div class="shots-wrap">
    <div class="shots-title">Screenshots</div>
    <div class="shots-grid" id="shotsGrid">
      <label class="add-shot">
        +
        <input type="file" id="shotInput" accept="image/*" multiple>
      </label>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-cat="LIFTS">LIFTS</div>
    <div class="tab" data-cat="PLYOS">PLYOS</div>
    <div class="tab" data-cat="BODYWEIGHT">BODY/ISO</div>
    <div class="tab" data-cat="RUN">RUN</div>
    <div class="tab" data-cat="SUMMARY">SUMMARY</div>
  </div>

  <div class="section active" id="section-LIFTS"></div>
  <div class="section" id="section-PLYOS"></div>
  <div class="section" id="section-BODYWEIGHT"></div>
  <div class="section" id="section-RUN"></div>
  <div class="section" id="section-SUMMARY">
    <button class="share-btn" id="shareBtn">Share Workout</button>
    <div id="summaryContent"></div>
  </div>
</main>

<div class="bottom-nav">
  <button id="historyBtn">History</button>
</div>

<div class="modal" id="imgModal"><img id="modalImg" src=""></div>

<div class="history-panel" id="historyPanel">
  <div class="history-header">
    <h1 style="margin:0;">History</h1>
    <button class="close-btn" id="closeHistory">Close</button>
  </div>
  <div id="historyList"></div>
</div>

<div class="sheet-backdrop" id="sheetBackdrop"></div>
<div class="sheet" id="sheet">
  <div class="sheet-header">
    <button class="sheet-close spacer">&#10005;</button>
    <div class="sheet-titles">
      <div class="sheet-title" id="sheetTitle">Exercise</div>
      <div class="sheet-subtitle" id="sheetSubtitle">Set 1</div>
      <div class="sheet-last" id="sheetLast"></div>
    </div>
    <button class="sheet-close" id="sheetClose">&#10005;</button>
  </div>
  <div class="wheels-row" id="wheelsRow">
    <div class="wheel-highlight"></div>
  </div>
  <button class="sheet-save-btn" id="sheetSave">Add Set</button>
  <button class="sheet-delete-btn" id="sheetDelete" style="display:none;">Delete Set</button>
</div>

<div class="toast" id="toast">Saved</div>

<script>
(function () {
  "use strict";

  var EXERCISES = {
    LIFTS: [
      { name: "RDL", type: "reps_weight" },
      { name: "ATG Squat", type: "reps_weight" },
      { name: "Push Press", type: "reps_weight" },
      { name: "Bulgarian Split Squat", type: "reps_weight" },
      { name: "SLRDL", type: "reps_weight" },
      { name: "Leg Extensions", type: "reps_weight" },
      { name: "Calf Raise", type: "reps_weight" }
    ],
    PLYOS: [
      { name: "Jump Rope", type: "time" },
      { name: "Box Jump", type: "reps_height" },
      { name: "Depth Jump", type: "reps_height" },
      { name: "Single Leg Reactive Hops", type: "count" },
      { name: "Skater Lunge", type: "count" }
    ],
    BODYWEIGHT: [
      { name: "Push Ups", type: "count_bw" },
      { name: "Pull Ups", type: "count_bw" },
      { name: "Dips", type: "count_bw" },
      { name: "Helicopters", type: "count_bw" },
      { name: "Plank Hold", type: "time_bw" },
      { name: "Wall Sit", type: "time_bw" }
    ],
    RUN: [
      { name: "Run Hard", type: "time_distance" },
      { name: "Run Easy", type: "time_distance" },
      { name: "Incline Jog", type: "time_distance" }
    ]
  };

  // Each field carries its wheel range so the sheet can build a scroll wheel for it.
  var FIELDS = {
    reps_weight: [
      { key: "reps", label: "Reps", min: 0, max: 50, step: 1 },
      { key: "weight", label: "Weight (lb)", min: 0, max: 500, step: 5 }
    ],
    reps_height: [
      { key: "reps", label: "Reps", min: 0, max: 50, step: 1 },
      { key: "height", label: "Height (in)", min: 0, max: 60, step: 1 }
    ],
    time: [
      { key: "min", label: "Min", min: 0, max: 30, step: 1 },
      { key: "sec", label: "Sec", min: 0, max: 59, step: 1 }
    ],
    count: [
      { key: "count", label: "Count", min: 0, max: 100, step: 1 }
    ],
    count_bw: [
      { key: "count", label: "Count", min: 0, max: 100, step: 1 },
      { key: "bw", label: "% BW", min: 50, max: 200, step: 5, suffix: "%" }
    ],
    time_bw: [
      { key: "min", label: "Min", min: 0, max: 30, step: 1 },
      { key: "sec", label: "Sec", min: 0, max: 59, step: 1 },
      { key: "bw", label: "% BW", min: 50, max: 200, step: 5, suffix: "%" }
    ],
    time_distance: [
      { key: "min", label: "Min", min: 0, max: 180, step: 1 },
      { key: "miles", label: "Miles", min: 0, max: 26, step: 0.25 }
    ]
  };

  var DEFAULTS = {
    reps_weight: { reps: 8, weight: 45 },
    reps_height: { reps: 5, height: 24 },
    time: { min: 1, sec: 0 },
    count: { count: 10 },
    count_bw: { count: 10, bw: 100 },
    time_bw: { min: 1, sec: 0, bw: 100 },
    time_distance: { min: 30, miles: 3 }
  };

  var CAT_LABELS = {
    LIFTS: "Lifts",
    PLYOS: "Plyos",
    BODYWEIGHT: "Bodyweight / Iso",
    RUN: "Run"
  };

  var UNIT_SUFFIX = {
    reps_weight: " lb",
    reps_height: " in",
    time: " min",
    count: " reps",
    count_bw: " reps",
    time_bw: " min",
    time_distance: ""
  };

  var db = null;
  var current = null; // in-memory record for the selected date
  var activeCat = "LIFTS";
  var lastSessions = {}; // exercise name -> { date, sets }

  function pad(n) { return n < 10 ? "0" + n : "" + n; }
  function todayStr() {
    var d = new Date();
    return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
  }
  function shiftDate(str, delta) {
    var parts = str.split("-").map(Number);
    var d = new Date(parts[0], parts[1] - 1, parts[2]);
    d.setDate(d.getDate() + delta);
    return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
  }
  function prettyDate(str) {
    var parts = str.split("-").map(Number);
    var d = new Date(parts[0], parts[1] - 1, parts[2]);
    return d.toLocaleDateString(undefined, { weekday: "long", month: "short", day: "numeric", year: "numeric" });
  }

  function openDB() {
    return new Promise(function (resolve, reject) {
      var req = indexedDB.open("liftTrackerDB", 1);
      req.onupgradeneeded = function (e) {
        var _db = e.target.result;
        if (!_db.objectStoreNames.contains("workouts")) {
          _db.createObjectStore("workouts", { keyPath: "date" });
        }
      };
      req.onsuccess = function (e) { resolve(e.target.result); };
      req.onerror = function (e) { reject(e); };
    });
  }

  function getWorkout(date) {
    return new Promise(function (resolve, reject) {
      var tx = db.transaction("workouts", "readonly");
      var store = tx.objectStore("workouts");
      var req = store.get(date);
      req.onsuccess = function () { resolve(req.result || null); };
      req.onerror = function (e) { reject(e); };
    });
  }

  function putWorkout(record) {
    return new Promise(function (resolve, reject) {
      var tx = db.transaction("workouts", "readwrite");
      var store = tx.objectStore("workouts");
      var req = store.put(record);
      req.onsuccess = function () { resolve(); };
      req.onerror = function (e) { reject(e); };
    });
  }

  function getAllWorkouts() {
    return new Promise(function (resolve, reject) {
      var tx = db.transaction("workouts", "readonly");
      var store = tx.objectStore("workouts");
      var req = store.getAll();
      req.onsuccess = function () { resolve(req.result || []); };
      req.onerror = function (e) { reject(e); };
    });
  }

  function emptyRecord(date) {
    return { date: date, exercises: {}, screenshots: [] };
  }

  var saveTimer = null;
  function scheduleSave() {
    if (!current) return;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function () {
      putWorkout(current).then(showToast);
    }, 150);
  }

  function showToast() {
    var t = document.getElementById("toast");
    t.classList.add("show");
    setTimeout(function () { t.classList.remove("show"); }, 700);
  }

  // Bodyweight % only gets called out when it isn't plain bodyweight (100%),
  // so old sets logged before this field existed still read cleanly.
  function bwTag(s, compact) {
    if (s.bw === undefined || s.bw === null || s.bw === 100) return "";
    return compact ? ("@" + s.bw + "%") : (" @ " + s.bw + "% BW");
  }

  function formatSet(type, s) {
    if (type === "reps_weight") return s.reps + " reps × " + s.weight + " lb";
    if (type === "reps_height") return s.reps + " reps × " + s.height + " in";
    if (type === "time") return (s.min || 0) + ":" + pad(s.sec || 0) + " min";
    if (type === "count_bw") return s.count + " reps" + bwTag(s);
    if (type === "time_bw") return (s.min || 0) + ":" + pad(s.sec || 0) + " min" + bwTag(s);
    if (type === "time_distance") return (s.min || 0) + " min · " + s.miles + " mi";
    return s.count + " reps";
  }

  function formatSetCompact(type, s) {
    if (type === "reps_weight") return s.reps + "×" + s.weight;
    if (type === "reps_height") return s.reps + "×" + s.height;
    if (type === "time") return (s.min || 0) + ":" + pad(s.sec || 0);
    if (type === "count_bw") return s.count + bwTag(s, true);
    if (type === "time_bw") return (s.min || 0) + ":" + pad(s.sec || 0) + bwTag(s, true);
    if (type === "time_distance") return s.miles + "mi/" + (s.min || 0) + "min";
    return String(s.count);
  }

  function daysAgoLabel(dateStr, refStr) {
    var a = dateStr.split("-").map(Number);
    var b = refStr.split("-").map(Number);
    var d1 = new Date(a[0], a[1] - 1, a[2]);
    var d2 = new Date(b[0], b[1] - 1, b[2]);
    var diff = Math.round((d2 - d1) / 86400000);
    if (diff === 1) return "yesterday";
    if (diff > 1) return diff + " days ago";
    return prettyDate(dateStr);
  }

  function lastSessionLine(ex) {
    var last = lastSessions[ex.name];
    if (!last) return "";
    var summary = last.sets.map(function (s) { return formatSetCompact(ex.type, s); }).join(", ");
    return "Last (" + daysAgoLabel(last.date, current.date) + "): " + summary + UNIT_SUFFIX[ex.type];
  }

  function computeLastSessions(beforeDate) {
    return getAllWorkouts().then(function (all) {
      var prior = all.filter(function (r) { return r.date < beforeDate; })
        .sort(function (a, b) { return a.date < b.date ? 1 : -1; }); // most recent first
      var map = {};
      Object.keys(EXERCISES).forEach(function (cat) {
        EXERCISES[cat].forEach(function (ex) {
          for (var i = 0; i < prior.length; i++) {
            var sets = prior[i].exercises && prior[i].exercises[ex.name];
            if (sets && sets.length) {
              map[ex.name] = { date: prior[i].date, sets: sets };
              break;
            }
          }
        });
      });
      return map;
    });
  }

  function renderSection(cat) {
    var container = document.getElementById("section-" + cat);
    container.innerHTML = "";
    EXERCISES[cat].forEach(function (ex) {
     try {
      var card = document.createElement("div");
      card.className = "exercise-card";

      var head = document.createElement("div");
      head.className = "exercise-head";
      var headCol = document.createElement("div");
      headCol.className = "exercise-headcol";
      var nameEl = document.createElement("div");
      nameEl.className = "exercise-name";
      nameEl.textContent = ex.name;
      headCol.appendChild(nameEl);
      var lastLine = lastSessionLine(ex);
      if (lastLine) {
        var lastEl = document.createElement("div");
        lastEl.className = "exercise-last";
        lastEl.textContent = lastLine;
        headCol.appendChild(lastEl);
      }
      var addBtn = document.createElement("button");
      addBtn.className = "add-set-btn";
      addBtn.textContent = "+ Add Set";
      addBtn.addEventListener("click", function () { openSheet(ex, "add", null); });
      head.appendChild(headCol);
      head.appendChild(addBtn);
      card.appendChild(head);

      var sets = (current.exercises[ex.name] || []);
      if (sets.length === 0) {
        var hint = document.createElement("div");
        hint.className = "empty-hint";
        hint.textContent = "No sets logged yet.";
        card.appendChild(hint);
      } else {
        sets.forEach(function (setObj, idx) {
          card.appendChild(renderSetRow(ex, setObj, idx));
        });
      }

      container.appendChild(card);
     } catch (err) {
       console.error("Failed to render exercise card for", ex.name, err);
     }
    });
  }

  function renderSetRow(ex, setObj, idx) {
    var row = document.createElement("div");
    row.className = "set-row";

    var tap = document.createElement("div");
    tap.className = "set-tap";
    var num = document.createElement("div");
    num.className = "set-num";
    num.textContent = "#" + (idx + 1);
    var summary = document.createElement("div");
    summary.className = "set-summary";
    summary.textContent = formatSet(ex.type, setObj);
    tap.appendChild(num);
    tap.appendChild(summary);
    tap.addEventListener("click", function () { openSheet(ex, "edit", idx); });
    row.appendChild(tap);

    var del = document.createElement("button");
    del.className = "del-set";
    del.textContent = "✕";
    del.addEventListener("click", function (e) {
      e.stopPropagation();
      current.exercises[ex.name].splice(idx, 1);
      scheduleSave();
      renderSection(activeCat);
      renderSummary();
    });
    row.appendChild(del);

    return row;
  }

  function renderSummary() {
    var container = document.getElementById("summaryContent");
    container.innerHTML = "";
    var any = false;
    Object.keys(EXERCISES).forEach(function (cat) {
      var loggedExercises = EXERCISES[cat].filter(function (ex) {
        var sets = current.exercises[ex.name];
        return sets && sets.length;
      });
      if (!loggedExercises.length) return;
      any = true;

      var block = document.createElement("div");
      block.className = "summary-block";
      var title = document.createElement("div");
      title.className = "summary-cat-title";
      title.textContent = CAT_LABELS[cat];
      block.appendChild(title);

      loggedExercises.forEach(function (ex) {
       try {
        var sets = current.exercises[ex.name];
        var row = document.createElement("div");
        row.className = "summary-ex-row";
        var name = document.createElement("div");
        name.className = "summary-ex-name";
        name.textContent = ex.name;
        var detail = document.createElement("div");
        detail.className = "summary-ex-sets";
        detail.textContent = sets.map(function (s) {
          return formatSetCompact(ex.type, s);
        }).join("   ·   ") + UNIT_SUFFIX[ex.type];
        row.appendChild(name);
        row.appendChild(detail);
        block.appendChild(row);
       } catch (err) {
         console.error("Failed to render summary row for", ex.name, err);
       }
      });

      container.appendChild(block);
    });
    if (!any) {
      container.innerHTML = '<div class="empty-hint">No sets logged for this day yet.</div>';
    }
  }

  function buildSummaryText() {
    var lines = ["Workout — " + prettyDate(current.date), ""];
    var any = false;
    Object.keys(EXERCISES).forEach(function (cat) {
      var loggedExercises = EXERCISES[cat].filter(function (ex) {
        var sets = current.exercises[ex.name];
        return sets && sets.length;
      });
      if (!loggedExercises.length) return;
      any = true;
      lines.push(CAT_LABELS[cat].toUpperCase());
      loggedExercises.forEach(function (ex) {
       try {
        var sets = current.exercises[ex.name];
        var detail = sets.map(function (s) { return formatSetCompact(ex.type, s); }).join(", ");
        lines.push(ex.name + ": " + detail + UNIT_SUFFIX[ex.type]);
       } catch (err) {
         console.error("Failed to build summary text for", ex.name, err);
         lines.push(ex.name + ": (error displaying — check console)");
       }
      });
      lines.push("");
    });
    if (!any) return "No sets logged for " + prettyDate(current.date) + ".";
    return lines.join("\n").trim();
  }

  function shareWorkout() {
    var text = buildSummaryText();
    if (navigator.share) {
      navigator.share({ title: "Workout " + current.date, text: text }).catch(function () {});
    } else if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(showToast);
    } else {
      window.prompt("Copy this workout summary:", text);
    }
  }

  function renderShots() {
    var grid = document.getElementById("shotsGrid");
    var addLabel = grid.querySelector(".add-shot");
    grid.innerHTML = "";
    (current.screenshots || []).forEach(function (shot, idx) {
      var thumb = document.createElement("div");
      thumb.className = "shot-thumb";
      var img = document.createElement("img");
      img.src = URL.createObjectURL(shot.blob);
      img.addEventListener("click", function () {
        document.getElementById("modalImg").src = img.src;
        document.getElementById("imgModal").classList.add("open");
      });
      var x = document.createElement("button");
      x.className = "x";
      x.textContent = "✕";
      x.addEventListener("click", function (e) {
        e.stopPropagation();
        current.screenshots.splice(idx, 1);
        scheduleSave();
        renderShots();
      });
      thumb.appendChild(img);
      thumb.appendChild(x);
      grid.appendChild(thumb);
    });
    grid.appendChild(addLabel);
  }

  function loadDate(date) {
    document.getElementById("dateInput").value = date;
    document.getElementById("dayTitle").textContent = prettyDate(date);
    Promise.all([getWorkout(date), computeLastSessions(date)]).then(function (results) {
      current = results[0] || emptyRecord(date);
      lastSessions = results[1];
      renderShots();
      renderSection("LIFTS");
      renderSection("PLYOS");
      renderSection("BODYWEIGHT");
      renderSection("RUN");
      renderSummary();
    });
  }

  function switchTab(cat) {
    activeCat = cat;
    document.querySelectorAll(".tab").forEach(function (t) {
      t.classList.toggle("active", t.dataset.cat === cat);
    });
    document.querySelectorAll(".section").forEach(function (s) {
      s.classList.toggle("active", s.id === "section-" + cat);
    });
  }

  function renderHistory() {
    getAllWorkouts().then(function (all) {
      all.sort(function (a, b) { return a.date < b.date ? 1 : -1; });
      var list = document.getElementById("historyList");
      list.innerHTML = "";
      if (all.length === 0) {
        list.innerHTML = '<div style="color:var(--muted);">No workouts logged yet.</div>';
        return;
      }
      all.forEach(function (rec) {
        var setCount = 0;
        Object.keys(rec.exercises || {}).forEach(function (k) { setCount += rec.exercises[k].length; });
        var item = document.createElement("div");
        item.className = "history-item";
        var left = document.createElement("div");
        left.innerHTML = '<div class="d">' + prettyDate(rec.date) + '</div>' +
          '<div class="meta">' + setCount + ' sets logged' +
          (rec.screenshots && rec.screenshots.length ? " &middot; " + rec.screenshots.length + " photo(s)" : "") +
          '</div>';
        var goBtn = document.createElement("button");
        goBtn.className = "go-btn";
        goBtn.textContent = "Open";
        goBtn.addEventListener("click", function () {
          loadDate(rec.date);
          switchTab("SUMMARY");
          document.getElementById("historyPanel").classList.remove("open");
        });
        item.appendChild(left);
        item.appendChild(goBtn);
        list.appendChild(item);
      });
    });
  }

  // ---------------- Wheel picker sheet ----------------

  var ITEM_H = 40;
  var WHEEL_H = 150;
  var sheetState = null; // { ex, mode, index, values }

  function buildWheelColumn(field, value, onChange) {
    var col = document.createElement("div");
    col.className = "wheel-col";

    var label = document.createElement("div");
    label.className = "wheel-label";
    label.textContent = field.label;
    col.appendChild(label);

    var scroller = document.createElement("div");
    scroller.className = "wheel-scroll";
    var inner = document.createElement("div");
    var pad = (WHEEL_H - ITEM_H) / 2;
    inner.style.paddingTop = pad + "px";
    inner.style.paddingBottom = pad + "px";

    var items = [];
    for (var v = field.min; v <= field.max; v += field.step) items.push(v);

    items.forEach(function (v) {
      var it = document.createElement("div");
      it.className = "wheel-item";
      it.textContent = String(v) + (field.suffix || "");
      inner.appendChild(it);
    });
    scroller.appendChild(inner);

    var fadeTop = document.createElement("div");
    fadeTop.className = "wheel-fade top";
    var fadeBottom = document.createElement("div");
    fadeBottom.className = "wheel-fade bottom";

    col.appendChild(scroller);
    col.appendChild(fadeTop);
    col.appendChild(fadeBottom);

    function highlight(idx) {
      Array.prototype.forEach.call(inner.children, function (el, i) {
        el.classList.toggle("active", i === idx);
      });
    }

    var initIdx = items.indexOf(value);
    if (initIdx < 0) {
      initIdx = 0;
      var best = Infinity;
      items.forEach(function (v, i) {
        var d = Math.abs(v - value);
        if (d < best) { best = d; initIdx = i; }
      });
    }
    requestAnimationFrame(function () {
      scroller.scrollTop = initIdx * ITEM_H;
      highlight(initIdx);
    });

    var scrollTimer = null;
    scroller.addEventListener("scroll", function () {
      clearTimeout(scrollTimer);
      scrollTimer = setTimeout(function () {
        var idx = Math.round(scroller.scrollTop / ITEM_H);
        idx = Math.max(0, Math.min(items.length - 1, idx));
        scroller.scrollTop = idx * ITEM_H;
        highlight(idx);
        onChange(items[idx]);
      }, 90);
    });

    return col;
  }

  function openSheet(ex, mode, index) {
    var list = current.exercises[ex.name] || [];
    var values;
    if (mode === "edit") {
      values = Object.assign({}, list[index]);
    } else if (list.length) {
      values = Object.assign({}, list[list.length - 1]);
    } else {
      values = Object.assign({}, DEFAULTS[ex.type]);
    }

    sheetState = { ex: ex, mode: mode, index: index, values: values };

    document.getElementById("sheetTitle").textContent = ex.name;
    document.getElementById("sheetSubtitle").textContent =
      "Set " + (mode === "edit" ? index + 1 : list.length + 1);
    document.getElementById("sheetLast").textContent = lastSessionLine(ex);
    document.getElementById("sheetSave").textContent = mode === "edit" ? "Save Changes" : "Add Set";
    document.getElementById("sheetDelete").style.display = mode === "edit" ? "block" : "none";

    var wheelsRow = document.getElementById("wheelsRow");
    wheelsRow.innerHTML = '<div class="wheel-highlight"></div>';
    FIELDS[ex.type].forEach(function (field) {
      var col = buildWheelColumn(field, values[field.key], function (v) {
        sheetState.values[field.key] = v;
      });
      wheelsRow.appendChild(col);
    });

    document.getElementById("sheetBackdrop").classList.add("open");
    document.getElementById("sheet").classList.add("open");
    document.body.classList.add("sheet-open");
  }

  function closeSheet() {
    document.getElementById("sheetBackdrop").classList.remove("open");
    document.getElementById("sheet").classList.remove("open");
    document.body.classList.remove("sheet-open");
    sheetState = null;
  }

  function onSheetSave() {
    if (!sheetState) return;
    var ex = sheetState.ex;
    if (!current.exercises[ex.name]) current.exercises[ex.name] = [];
    var list = current.exercises[ex.name];
    var vals = Object.assign({}, sheetState.values);

    if (sheetState.mode === "add") {
      list.push(vals);
      scheduleSave();
      renderSection(activeCat);
      renderSummary();
      openSheet(ex, "add", null); // stay open, ready for the next set
    } else {
      list[sheetState.index] = vals;
      scheduleSave();
      renderSection(activeCat);
      renderSummary();
      closeSheet();
    }
  }

  function onSheetDelete() {
    if (!sheetState || sheetState.mode !== "edit") return;
    var list = current.exercises[sheetState.ex.name];
    list.splice(sheetState.index, 1);
    scheduleSave();
    renderSection(activeCat);
    renderSummary();
    closeSheet();
  }

  document.getElementById("sheetSave").addEventListener("click", onSheetSave);
  document.getElementById("sheetDelete").addEventListener("click", onSheetDelete);
  document.getElementById("sheetClose").addEventListener("click", closeSheet);
  document.getElementById("sheetBackdrop").addEventListener("click", closeSheet);

  // ---------------- Wiring ----------------

  document.getElementById("dateInput").addEventListener("change", function (e) {
    loadDate(e.target.value);
  });
  document.getElementById("prevDay").addEventListener("click", function () {
    loadDate(shiftDate(current.date, -1));
  });
  document.getElementById("nextDay").addEventListener("click", function () {
    loadDate(shiftDate(current.date, 1));
  });
  document.getElementById("reloadBtn").addEventListener("click", function () {
    window.location.reload();
  });
  document.querySelectorAll(".tab").forEach(function (t) {
    t.addEventListener("click", function () { switchTab(t.dataset.cat); });
  });
  document.getElementById("shotInput").addEventListener("change", function (e) {
    var files = Array.from(e.target.files || []);
    if (!current.screenshots) current.screenshots = [];
    files.forEach(function (file) {
      current.screenshots.push({ blob: file, name: file.name });
    });
    scheduleSave();
    renderShots();
    e.target.value = "";
  });
  document.getElementById("imgModal").addEventListener("click", function () {
    this.classList.remove("open");
  });
  document.getElementById("shareBtn").addEventListener("click", shareWorkout);
  document.getElementById("historyBtn").addEventListener("click", function () {
    renderHistory();
    document.getElementById("historyPanel").classList.add("open");
  });
  document.getElementById("closeHistory").addEventListener("click", function () {
    document.getElementById("historyPanel").classList.remove("open");
  });

  openDB().then(function (_db) {
    db = _db;
    loadDate(todayStr());
  });
})();
</script>
